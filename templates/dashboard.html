<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>影视仓接口中心 - 控制台</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .dashboard-container { max-width: 1400px; width: 96%; margin: 0 auto; padding: 2rem; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
        
        .sub-box {
            background: rgba(59, 130, 246, 0.05);
            border: 1px dashed var(--accent);
            padding: 2rem;
            border-radius: 16px;
            margin-bottom: 2rem;
            text-align: center;
        }
        .sub-link {
            display: inline-block;
            background: rgba(0,0,0,0.3);
            padding: 12px 20px;
            border-radius: 8px;
            color: #60a5fa;
            font-family: 'JetBrains Mono', monospace;
            margin: 15px 0;
            word-break: break-all;
            border: 1px solid rgba(96, 165, 250, 0.2);
        }

        .main-layout { display: flex; flex-direction: column; gap: 2rem; }
        .add-panel { max-width: 500px; margin: 0 auto; width: 100%; }
        
        .control-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .source-card { animation: fadeIn 0.4s ease forwards; }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <div class="header">
            <h2 style="font-weight: 800; letter-spacing: -1px;">🚀 影视仓接口管理</h2>
            <div style="display: flex; gap: 1rem; align-items: center;">
                <span class="version-tag">{{ version }}</span>
                <span style="color: var(--text-muted)">{{ username }}</span>
                {% if is_admin %}
                <a href="/admin" class="btn" style="width:auto; padding: 8px 15px; border: 1px solid #60a5fa; color: #60a5fa; text-decoration: none; border-radius: 8px;">🎛️ 管理控制台</a>
                {% endif %}
                <a href="{{ url_for('api_logout') }}" class="btn action-btn" style="width:auto; padding: 8px 15px">登出</a>
            </div>
        </div>

        <div class="glass-panel sub-box">
            <h3 style="margin-bottom: 0.5rem">🔗 我的专属订阅链接</h3>
            <p style="color: var(--text-muted); font-size: 0.9rem;">将此链接填入 TVBOX/影视仓 的配置地址中即可使用</p>
            <div class="sub-link" id="subLink">{{ sub_url }}</div>
            <div style="display: flex; align-items: center; justify-content: center; gap: 0.5rem; margin-top: 5px; margin-bottom: 15px;">
                <input type="checkbox" id="onlyOnline" onchange="updateSubUrl()" style="width: 16px; height: 16px; cursor: pointer;">
                <label for="onlyOnline" style="font-size: 0.85rem; color: var(--text-muted); cursor: pointer; user-select: none;">仅导出在线接口 (自动过滤异常源)</label>
            </div>
            <div style="display: flex; justify-content: center; gap: 1rem;">
                <button class="btn btn-primary" style="width:auto" onclick="copyLink()">📋 复制链接</button>
                <button class="btn action-btn" style="width:auto" onclick="openPreview()">👁️ 预览 JSON</button>
            </div>
        </div>

        <div class="main-layout">
            <div class="top-panels" style="display: flex; gap: 2rem; flex-wrap: wrap; justify-content: center;">
                <div class="glass-panel add-panel" style="flex: 1; min-width: 300px; max-width: 500px; margin: 0;">
                    <h3 style="margin-bottom: 1.5rem; text-align: center;">➕ 添加新接口</h3>
                    <form id="addForm">
                        <input type="hidden" id="sourceId">
                        <div class="form-group">
                            <label>接口名称</label>
                            <input type="text" id="name" class="form-control" placeholder="例如：阿里专线 / 直播源 A" required>
                        </div>
                        <div class="form-group">
                            <label>接口地址 (URL)</label>
                            <input type="url" id="url" class="form-control" placeholder="http://..." required>
                        </div>
                        <div class="form-group">
                            <label>接口类型</label>
                            <select id="type" class="form-control" style="background: #111827">
                                <option value="site">点播站源 (Site API)</option>
                                <option value="live">直播频道 (Live URL)</option>
                            </select>
                        </div>
                        <button type="submit" id="submitBtn" class="btn btn-primary mt-4">立即保存接口</button>
                        <button type="button" id="cancelEdit" class="btn action-btn mt-2" style="display:none" onclick="resetForm()">取消编辑</button>
                    </form>
                </div>

                <div class="glass-panel recommended-panel" style="flex: 1; min-width: 300px; max-width: 500px; margin: 0; display: flex; flex-direction: column;">
                    <h3 style="margin-bottom: 1.5rem; text-align: center;">🌟 推荐接口</h3>
                    <div id="recommendedList" style="flex-grow: 1; overflow-y: auto; max-height: 340px; padding-right: 10px; display: flex; flex-direction: column; gap: 10px;">
                        <p style="text-align: center; color: var(--text-muted); margin-top: 2rem;">加载中...</p>
                    </div>
                    <div style="margin-top: 1.5rem; text-align: center; border-top: 1px solid var(--border-glass); padding-top: 1.5rem;">
                        <button class="btn btn-primary" onclick="addSelectedRecommended()">批量添加选中</button>
                    </div>
                </div>
            </div>

            <div>
                <div class="control-bar">
                    <h3>📋 我的接口列表 (<span id="sourceCount">0</span>)</h3>
                    <button class="action-btn" onclick="loadSources()">🔄 刷新列表</button>
                </div>
                <div class="source-grid" id="sourceList"></div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="previewModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>JSON 配置预览</h3>
                <button class="close-modal" onclick="closeModal()">×</button>
            </div>
            <div class="tabs">
                <div class="tab active" data-type="multi" onclick="switchTab('multi', this)">多仓格式 (Default)</div>
                <div class="tab" data-type="single" onclick="switchTab('single', this)">单仓格式 (Legacy)</div>
            </div>
            <pre id="jsonPreview">加载中...</pre>
            <div style="margin-top: 1.5rem; display: flex; justify-content: flex-end; gap: 1rem;">
                <button class="btn action-btn" style="width:auto" onclick="copySubLinkWithParams()">📋 复制该模式链接</button>
                <button class="btn btn-primary" style="width:auto" onclick="copyPreview()">📋 复制预览内容</button>
            </div>
        </div>
    </div>

    <script>
        let currentTab = 'multi';
        const subBaseUrl = "{{ sub_url }}";

        function copyText(text) {
            if (navigator.clipboard && window.isSecureContext) {
                return navigator.clipboard.writeText(text);
            } else {
                const textArea = document.createElement("textarea");
                textArea.value = text;
                textArea.style.position = "fixed";
                textArea.style.left = "-9999px";
                document.body.appendChild(textArea);
                textArea.focus();
                textArea.select();
                try {
                    document.execCommand('copy');
                } catch (err) {}
                document.body.removeChild(textArea);
                return Promise.resolve();
            }
        }

        function copyLink() {
            copyText(document.getElementById('subLink').innerText).then(() => alert('✅ 订阅链接已复制'));
        }

        function updateSubUrl() {
            const onlyOnline = document.getElementById('onlyOnline').checked;
            const subLinkEl = document.getElementById('subLink');
            if (onlyOnline) {
                subLinkEl.innerText = subBaseUrl.includes('?') ? `${subBaseUrl}&only_online=true` : `${subBaseUrl}?only_online=true`;
            } else {
                subLinkEl.innerText = subBaseUrl;
            }
        }

        function copyPreview() {
            copyText(document.getElementById('jsonPreview').innerText).then(() => alert('✅ JSON 内容已复制'));
        }

        function copySubLinkWithParams() {
            const onlyOnline = document.getElementById('onlyOnline').checked;
            let url = `${subBaseUrl}${subBaseUrl.includes('?') ? '&' : '?'}type=${currentTab}`;
            if (onlyOnline) url += '&only_online=true';
            copyText(url).then(() => alert(`✅ ${currentTab === 'multi' ? '多仓' : '单仓'}订阅链接已复制`));
        }

        function openPreview() {
            document.getElementById('previewModal').style.display = 'flex';
            fetchPreview();
        }

        function closeModal() {
            document.getElementById('previewModal').style.display = 'none';
        }

        function switchTab(type, el) {
            currentTab = type;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            fetchPreview();
        }

        async function fetchPreview() {
            const previewEl = document.getElementById('jsonPreview');
            previewEl.innerText = '// 正在生成预览...';
            const onlyOnline = document.getElementById('onlyOnline').checked;
            let url = `/api/subscribe/{{ username }}.json?type=${currentTab}`;
            if (onlyOnline) url += '&only_online=true';
            
            const res = await fetch(url);
            const text = await res.text();
            previewEl.innerText = text;
        }

        async function loadSources() {
            const container = document.getElementById('sourceList');
            container.innerHTML = '<p style="color:var(--text-muted)">正在同步数据...</p>';
            
            const res = await fetch('/api/source/list');
            const json = await res.json();
            container.innerHTML = '';
            document.getElementById('sourceCount').innerText = json.data.length;
            
            if(json.data.length === 0) {
                container.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 3rem; color: var(--text-muted)">暂无接口，快去上方添加一个吧！</div>';
                return;
            }

            json.data.forEach(item => {
                const typeClass = item.type === 'site' ? 'site' : 'live';
                const typeName = item.type === 'site' ? '点播' : '直播';
                
                const card = document.createElement('div');
                card.className = `source-card ${typeClass}`;
                card.innerHTML = `
                    <div class="source-header">
                        <div class="source-title">${item.name}</div>
                        <span class="status-badge status-checking" id="status-${item.id}">检查中...</span>
                    </div>
                    <div class="source-url">${item.url}</div>
                    <div class="source-footer">
                        <span class="status-badge">${typeName}</span>
                        <div class="card-actions">
                            <button class="action-btn" onclick='editSource(${JSON.stringify(item)})' title="编辑">✏️</button>
                            <button class="action-btn" onclick="copyText('${item.url}').then(()=>alert('链接已复制'))" title="复制链接">📋</button>
                            <button class="action-btn delete" onclick="deleteSource(${item.id})" title="删除">🗑️</button>
                        </div>
                    </div>
                `;
                container.appendChild(card);
                checkStatus(item.id, item.url);
            });
        }

        async function checkStatus(id, url) {
            const el = document.getElementById(`status-${id}`);
            try {
                const res = await fetch('/api/source/check', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({url, id})
                });
                const data = await res.json();
                if(data.status === 'success') {
                    el.innerText = '在线';
                    el.className = 'status-badge status-online';
                } else {
                    el.innerText = '异常';
                    el.className = 'status-badge status-offline';
                }
            } catch (e) {
                el.innerText = '超时';
                el.className = 'status-badge status-offline';
            }
        }

        function editSource(item) {
            document.getElementById('sourceId').value = item.id;
            document.getElementById('name').value = item.name;
            document.getElementById('url').value = item.url;
            document.getElementById('type').value = item.type;
            document.getElementById('submitBtn').innerText = '保存修改';
            document.getElementById('cancelEdit').style.display = 'block';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function resetForm() {
            document.getElementById('addForm').reset();
            document.getElementById('sourceId').value = '';
            document.getElementById('submitBtn').innerText = '立即保存接口';
            document.getElementById('cancelEdit').style.display = 'none';
        }

        document.getElementById('addForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('sourceId').value;
            const endpoint = id ? '/api/source/update' : '/api/source/add';
            
            const payload = {
                name: document.getElementById('name').value,
                url: document.getElementById('url').value,
                type: document.getElementById('type').value
            };
            if(id) payload.id = id;

            const res = await fetch(endpoint, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });
            const data = await res.json();
            
            if(data.status === 'success') {
                resetForm();
                loadSources();
            } else {
                alert(data.message);
            }
        });

        async function deleteSource(id) {
            if(!confirm('确定要移除此接口吗？')) return;
            const res = await fetch('/api/source/delete', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({id})
            });
            const data = await res.json();
            if(data.status === 'success') loadSources();
        }

        async function loadRecommended() {
            try {
                const res = await fetch('/api/external/aipan');
                const json = await res.json();
                const container = document.getElementById('recommendedList');
                if (json.status === 'success' && json.data) {
                    container.innerHTML = '';
                    json.data.forEach((item, index) => {
                        const recId = 'rec_' + index;
                        const row = document.createElement('div');
                        row.className = 'recommended-item';
                        row.innerHTML = `
                            <div style="display: flex; align-items: center; justify-content: space-between; background: rgba(0,0,0,0.2); padding: 12px; border-radius: 8px; border: 1px solid var(--border-glass);">
                                <div style="display: flex; align-items: center; gap: 10px; overflow: hidden;">
                                    <input type="checkbox" class="rec-checkbox" data-name="${item.name}" data-url="${item.link}" style="width: 16px; height: 16px; flex-shrink: 0;">
                                    <div style="min-width: 0;">
                                        <div style="font-weight: 600; font-size: 0.95rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;" title="${item.name}">${item.name}</div>
                                        <div style="font-size: 0.75rem; color: var(--text-muted); font-family: monospace; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;" title="${item.link}">${item.link}</div>
                                    </div>
                                </div>
                                <div style="display: flex; align-items: center; gap: 8px; flex-shrink: 0;">
                                    <span class="status-badge status-checking" id="rec-status-${index}" style="font-size: 0.7rem;">查</span>
                                    <button class="action-btn" style="padding: 4px 8px; font-size: 0.8rem; background: var(--accent); color: white; border: none; border-radius: 4px;" onclick="addSingleRecommended('${item.name}', '${item.link}')">添加</button>
                                </div>
                            </div>
                        `;
                        container.appendChild(row);
                        
                        // Check status for this recommended item
                        fetch('/api/source/check', {
                            method: 'POST',
                            headers: {'Content-Type': 'application/json'},
                            body: JSON.stringify({url: item.link})
                        }).then(r => r.json()).then(data => {
                            const badge = document.getElementById(`rec-status-${index}`);
                            if(data.status === 'success') {
                                badge.className = 'status-badge status-online';
                                badge.innerText = '在线';
                            } else {
                                badge.className = 'status-badge status-offline';
                                badge.innerText = '异常';
                            }
                        }).catch(() => {
                            const badge = document.getElementById(`rec-status-${index}`);
                            badge.className = 'status-badge status-offline';
                            badge.innerText = '异常';
                        });
                    });
                } else {
                    container.innerHTML = '<p style="text-align: center; color: var(--text-muted); margin-top: 2rem;">加载失败或无推荐接口</p>';
                }
            } catch (e) {
                document.getElementById('recommendedList').innerHTML = '<p style="text-align: center; color: #ef4444; margin-top: 2rem;">网络错误，获取失败</p>';
            }
        }

        async function addSingleRecommended(name, url) {
            const res = await fetch('/api/source/add', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({name, url, type: 'site'})
            });
            const data = await res.json();
            if(data.status === 'success') {
                alert('添加成功！');
                loadSources();
            } else {
                alert(data.message);
            }
        }

        async function addSelectedRecommended() {
            const checkboxes = document.querySelectorAll('.rec-checkbox:checked');
            if (checkboxes.length === 0) {
                alert('请先勾选需要添加的接口！');
                return;
            }
            let successCount = 0;
            let errorCount = 0;
            const promises = Array.from(checkboxes).map(async (cb) => {
                const name = cb.getAttribute('data-name');
                const url = cb.getAttribute('data-url');
                try {
                    const res = await fetch('/api/source/add', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({name, url, type: 'site'})
                    });
                    const data = await res.json();
                    if(data.status === 'success') successCount++;
                    else errorCount++;
                } catch { errorCount++; }
            });

            await Promise.all(promises);
            alert(`批量添加完成！成功: ${successCount}，跳过/失败: ${errorCount}`);
            loadSources();
            // Uncheck all after success
            if(successCount > 0) {
                checkboxes.forEach(cb => cb.checked = false);
            }
        }

        loadSources();
        loadRecommended();
    </script>
</body>
</html>
