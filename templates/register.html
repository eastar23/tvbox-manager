<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>影视仓接口中心 - 注册</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="auth-wrapper">
        <div class="glass-panel auth-box">
            <h2>注册接口账号</h2>
            <form id="registerForm">
                <div class="form-group">
                    <label>用户名</label>
                    <input type="text" id="username" class="form-control" placeholder="设置用户名 (例如: admin123)" required>
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" id="password" class="form-control" placeholder="设置登录密码" required>
                </div>
                <div class="form-group">
                    <label>内部专属邀请码</label>
                    <input type="password" id="inviteCode" class="form-control" placeholder="请输入防滥用邀请码" required>
                </div>
                <div id="errorMsg" class="error-msg"></div>
                <button type="submit" class="btn btn-primary mt-4">立即注册</button>
            </form>
            <p class="text-center mt-4">
                <span style="color: var(--text-muted)">已有账号？</span>
                <a href="{{ url_for('login') }}">直接登录</a>
            </p>
        </div>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.disabled = true;
            btn.textContent = '注册中...';
            
            const res = await fetch('/api/auth/register', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    username: document.getElementById('username').value,
                    password: document.getElementById('password').value,
                    invite_code: document.getElementById('inviteCode').value
                })
            });
            const data = await res.json();
            
            if (data.status === 'success') {
                alert('注册成功，请登录！');
                window.location.href = '/login';
            } else {
                const err = document.getElementById('errorMsg');
                err.textContent = data.message;
                err.style.display = 'block';
                btn.disabled = false;
                btn.textContent = '立即注册';
            }
        });
    </script>
</body>
</html>
