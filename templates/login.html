<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>影视仓接口中心 - 登录</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="auth-wrapper">
        <div class="glass-panel auth-box">
            <h2>登录 TVBOX 接口系统</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label>用户名</label>
                    <input type="text" id="username" class="form-control" placeholder="输入用户名" required>
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" id="password" class="form-control" placeholder="输入密码" required>
                </div>
                <div id="errorMsg" class="error-msg"></div>
                <button type="submit" class="btn btn-primary mt-4">进入控制台</button>
            </form>
            <p class="text-center mt-4">
                <span style="color: var(--text-muted)">还没有账号？</span>
                <a href="{{ url_for('register') }}">立即注册</a>
            </p>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.disabled = true;
            btn.textContent = '登录中...';
            
            const res = await fetch('/api/auth/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    username: document.getElementById('username').value,
                    password: document.getElementById('password').value
                })
            });
            const data = await res.json();
            
            if (data.status === 'success') {
                window.location.href = '/dashboard';
            } else {
                const err = document.getElementById('errorMsg');
                err.textContent = data.message;
                err.style.display = 'block';
                btn.disabled = false;
                btn.textContent = '进入控制台';
            }
        });
    </script>
</body>
</html>
