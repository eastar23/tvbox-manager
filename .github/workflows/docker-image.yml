name: Auto Build and Publish to Docker Hub

# 只有当您向 Github 的 main 或 master 分支推送代码时，才会全自动触发这个机器人
on:
  push:
    branches: [ "main", "master" ]
    tags: [ "v*" ]  # 当推送以 v 开头的标签（如 v1.0.1）时触发
  workflow_dispatch:

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      # 提取 app.py 中的版本号
      - name: Extract version
        id: extract_version
        run: |
          VERSION=$(grep -o 'APP_VERSION = "[^"]*"' app.py | cut -d'"' -f2)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      # 使用 metadata-action 自动提取版本号
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/tvbox-manager
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}
            type=raw,value=${{ steps.extract_version.outputs.version }}
            type=ref,event=tag
            type=edge,branch=main

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: |
            ${{ steps.meta.outputs.labels }}
            org.opencontainers.image.version=${{ steps.extract_version.outputs.version }}

