name: Auto Build and Publish to Docker Hub

on:
  push:
    branches: [ "main", "master" ]
    tags: [ "v*" ]
  workflow_dispatch:

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 提取 app.py 中的版本号
      - name: Extract version
        id: extract_version
        run: |
          VERSION=$(grep -o 'APP_VERSION = "[^"]*"' app.py | cut -d'"' -f2)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      # 设置 QEMU (用于多架构构建)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # 设置 Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 使用 metadata-action 提取更丰富的 OCI 元数据
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/tvbox-manager
          tags: |
            # 自动生成 latest
            type=raw,value=latest,enable={{is_default_branch}}
            # 自动处理语义化版本 (v1.2.3 -> 1.2.3, 1.2, 1)
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            # 给本地 app.py 定义的版本也打个标
            type=raw,value=${{ steps.extract_version.outputs.version }}
          flavor: |
            latest=auto

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: |
            ${{ steps.meta.outputs.labels }}
            org.opencontainers.image.version=${{ steps.extract_version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update Docker Hub Description
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ secrets.DOCKERHUB_USERNAME }}/tvbox-manager
          short-description: "TVBox 接口统一化管理工具，支持一键订阅、拖拽排序与自动在线检测。注册码：888888"
          readme-filepath: ./README.md
