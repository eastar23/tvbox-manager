version: '3.8'

services:
  starlink-tvbox:
    # 因为您使用 1Panel，它可以直接在服务器上帮您一键编译打包，无需借助外部镜像仓库！
    build: .
    container_name: starlink-tvbox-api
    ports:
      - "8089:8089"
    # 持久化目录：升级/重建容器后数据不丢失
    # DATA_DIR 在 .env 中配置，可指定任意宿主机路径
    volumes:
      - ${DATA_DIR:-./data}:/app/data
    # 从 .env 文件加载环境变量（密钥、邀请码等配置）
    env_file:
      - .env
    restart: unless-stopped
